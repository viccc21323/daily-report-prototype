<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>大盘日报</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #fff;
      --line: #e2e5ea;
      --text: #30343b;
      --muted: #6e7683;
      --blue: #0b73e8;
      --red: #ff3f68;
      --green: #0f9f67;
      --shadow: 0 1px 2px rgba(20, 28, 40, .06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 1366px;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button { font: inherit; }

    .page { padding: 12px; }

    .filters {
      display: grid;
      grid-template-columns: 440px 1fr 420px;
      gap: 34px;
      min-height: 102px;
      padding: 20px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .quick-tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      height: 36px;
      padding: 2px;
      overflow: hidden;
      border-radius: 8px;
      background: #eef0f3;
    }

    .quick-tabs button {
      border: 0;
      border-radius: 7px;
      color: #6a7079;
      background: transparent;
      font-size: 15px;
      font-weight: 650;
      cursor: pointer;
    }

    .quick-tabs .active {
      color: #40464f;
      background: #fff;
      box-shadow: 0 1px 6px rgba(30, 41, 59, .12);
    }

    .filter-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
    }

    .filter-item label {
      font-size: 15px;
      font-weight: 750;
      color: #343941;
      white-space: nowrap;
    }

    .control,
    .select-control,
    .date-input {
      position: relative;
      height: 36px;
      padding: 0 38px 0 12px;
      border: 1px solid #d8dce3;
      border-radius: 8px;
      color: #555b65;
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      line-height: 34px;
      white-space: nowrap;
    }

    .control.disabled { color: #c3c7ce; background: #fbfbfc; }
    .control .arrow { padding: 0 22px; color: #c0c4cb; }

    .control::after {
      content: "";
      position: absolute;
      right: 13px;
      top: 11px;
      width: 9px;
      height: 9px;
      border-right: 2px solid #c5c9d0;
      border-bottom: 2px solid #c5c9d0;
      transform: rotate(45deg);
    }

    .date-control::after {
      top: 10px;
      width: 15px;
      height: 15px;
      border: 1.8px solid #c5c9d0;
      border-radius: 2px;
      transform: none;
    }

    .date-filter {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .date-inputs {
      display: none;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
    }

    .date-filter.custom .date-control {
      display: none;
    }

    .date-filter.custom .date-inputs {
      display: grid;
    }

    .date-input {
      width: 100%;
      padding: 0 8px;
      color: #343941;
      line-height: 1;
    }

    .date-inputs span {
      color: #8d95a1;
      font-size: 14px;
      font-weight: 700;
    }

    .select-control {
      width: 100%;
      appearance: none;
      cursor: pointer;
    }

    .filter-actions {
      grid-column: 3;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 12px;
    }

    .btn {
      height: 36px;
      padding: 0 18px;
      border: 1px solid #d8dce3;
      border-radius: 8px;
      color: #4e5560;
      background: #fff;
      font-size: 15px;
      font-weight: 750;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .btn.primary {
      min-width: 74px;
      color: #fff;
      border-color: var(--blue);
      background: var(--blue);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px 14px;
      margin-top: 10px;
    }

    .metric {
      position: relative;
      min-height: 100px;
      padding: 18px 16px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .metric-title {
      margin-bottom: 6px;
      color: #545b65;
      font-size: 15px;
      font-weight: 750;
    }

    .metric-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-height: 36px;
    }

    .metric-value {
      color: #3b4048;
      font-size: 32px;
      font-weight: 760;
      line-height: 1;
    }

    .metric-change {
      color: var(--red);
      font-size: 15px;
      font-weight: 650;
      white-space: nowrap;
    }

    .metric-sub {
      color: #717a88;
      font-size: 15px;
      font-weight: 650;
    }

    .help {
      display: inline-grid;
      place-items: center;
      width: 16px;
      height: 16px;
      border: 1.5px solid #666d77;
      border-radius: 50%;
      color: #666d77;
      font-size: 11px;
      font-weight: 850;
      line-height: 1;
    }

    .metric .help {
      position: absolute;
      top: 16px;
      right: 14px;
    }

    .table-panel {
      margin-top: 10px;
      overflow: hidden;
      border-radius: 8px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 54px;
      padding: 0 12px 0 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .tools {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .export {
      height: 38px;
      padding: 0 18px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: var(--blue);
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .icon-btn {
      display: inline-grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border: 1px solid #d8dce3;
      border-radius: 50%;
      color: #5f6670;
      background: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    .table-wrap {
      overflow: auto;
      padding: 0 10px 12px;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      border: 1px solid var(--line);
      border-radius: 5px;
      overflow: hidden;
    }

    th,
    td {
      height: 46px;
      min-width: 132px;
      padding: 0 12px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    th {
      height: 44px;
      color: #565d67;
      background: #f8f8f9;
      font-weight: 800;
    }

    th:nth-child(1), td:nth-child(1) { min-width: 68px; }
    th:nth-child(2), td:nth-child(2) { min-width: 124px; }
    th:nth-child(3), td:nth-child(3) { min-width: 100px; }
    th:nth-child(4), td:nth-child(4) { min-width: 128px; }

    tr:last-child td { border-bottom: 0; }
    th:last-child, td:last-child { border-right: 0; }

    .num { text-align: right; }
    .negative { color: #ba2440; }
    .positive { color: var(--green); }

    .status {
      display: flex;
      justify-content: space-between;
      padding: 10px 18px 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .mask {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      background: rgba(17, 24, 39, .22);
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 21;
      display: grid;
      grid-template-rows: auto 1fr auto;
      width: 360px;
      height: 100vh;
      transform: translateX(100%);
      border-left: 1px solid var(--line);
      background: #fff;
      box-shadow: -12px 0 32px rgba(20, 28, 40, .16);
      transition: transform .18s ease;
    }

    .mask.open { display: block; }
    .drawer.open { transform: translateX(0); }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .drawer-title {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--blue);
      font-size: 18px;
      font-weight: 850;
    }

    .collapse {
      position: relative;
      width: 22px;
      height: 22px;
      border-radius: 3px;
      background: var(--blue);
    }

    .collapse::after {
      content: "";
      position: absolute;
      left: 5px;
      right: 5px;
      top: 10px;
      height: 2px;
      background: #fff;
    }

    .close {
      border: 0;
      color: #747b86;
      background: transparent;
      font-size: 22px;
      cursor: pointer;
    }

    .field-list { overflow: auto; }

    .field-row {
      display: grid;
      grid-template-columns: 34px 34px 1fr 34px 34px;
      align-items: center;
      min-height: 36px;
      padding: 0 14px;
      font-size: 17px;
      font-weight: 650;
    }

    .field-row:hover { background: #f7fbff; }

    .check {
      display: inline-grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border: 2px solid #d9dde5;
      border-radius: 4px;
      background: #fff;
    }

    .check.on {
      border-color: var(--blue);
      background: var(--blue);
    }

    .check.on::after {
      content: "";
      width: 10px;
      height: 6px;
      border-left: 3px solid #fff;
      border-bottom: 3px solid #fff;
      transform: translateY(-2px) rotate(-45deg);
    }

    .drag {
      width: 22px;
      height: 22px;
      background: radial-gradient(circle, #30343b 1.6px, transparent 2.4px) 0 0 / 8px 8px;
    }

    .pin {
      position: relative;
      width: 18px;
      height: 18px;
      border: 1.6px solid currentColor;
      border-left: 0;
      border-bottom: 0;
      color: #30343b;
      transform: rotate(45deg);
    }

    .pin::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 1.6px;
      left: -6px;
      top: 8px;
      background: currentColor;
      transform: rotate(-45deg);
    }

    .pin.blue { color: var(--blue); }
    .pin.muted { color: #9ca3ad; }

    .drawer-foot {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      height: 48px;
      border-top: 1px solid var(--line);
    }

    .drawer-foot button {
      border: 0;
      background: #fff;
      font-size: 16px;
      font-weight: 750;
      cursor: pointer;
    }

    .drawer-foot .restore { color: #a5abb4; }
    .drawer-foot .confirm { color: var(--blue); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 30;
      display: none;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 8px;
      color: #fff;
      background: rgba(35, 41, 49, .92);
      font-size: 14px;
      font-weight: 700;
    }

    .toast.show { display: block; }
  </style>
</head>

        <button type="button" data-range="today">今日</button>

        <button class="active" type="button" data-range="30">近30日</button>

      <div class="filter-item">

      <div class="filter-actions">

        <button class="btn primary" type="button" id="searchBtn">查询</button>
      </div>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="table-panel" id="dailyDetail">

      </div>
      <div class="table-wrap">

      </div>
      <div class="status">
        <span id="rowCount">共 30 条，每页 10 条</span>
        <span id="fieldCount"></span>
      </div>
    </section>
  </main>

  <div class="mask" id="mask"></div>
  <aside class="drawer" id="drawer">

      <button class="close" type="button" id="closeDrawer">×</button>

      <button type="button" id="cancelDrawer">取消</button>

      ["6", "2026-06-16", "ALL", "所有渠道", "35,295.00", "37,227.00", "105.47%", "-1,932.00", "77.90%", "98.13%", "371,149.24", "359,810.44", "96.94%", "120.00", "220.00", "11,338.80", "11,218.80", "2,730.00", "904", "166", "52", "2,506", "511", "276", "13,230.00", "13,230.00", "3,920.00", "9,310.00", "47.93", "30.53%", "241", "22,065.00", "276", "30.53%", "15.05%", "13,230.00", "13,230.00", "47.93", "367", "22,065.00", "2,139", "17.16%", "60.12", "40.88%", "65.17%", "28.45%", "55.04%"]
    ];

    const table = document.getElementById("dailyTable");
    const fieldList = document.getElementById("fieldList");
    const drawer = document.getElementById("drawer");
    const mask = document.getElementById("mask");
    const toast = document.getElementById("toast");
    const dateRangeText = document.getElementById("dateRangeText");
    const dateFilter = document.getElementById("dateFilter");
    const customStart = document.getElementById("customStart");
    const customEnd = document.getElementById("customEnd");
    const channelSelect = document.getElementById("channelSelect");
    const dailyDetail = document.getElementById("dailyDetail");
    const baseDate = new Date("2026-06-21T00:00:00");
    let currentRange = "30";

    const channelOptions = [
      { id: "ALL", name: "所有渠道", factor: 1 },
      { id: "FB01", name: "Facebook渠道", factor: 0.32 },
      { id: "GG01", name: "Google渠道", factor: 0.26 },
      { id: "TK01", name: "TikTok渠道", factor: 0.21 },
      { id: "AG01", name: "代理渠道", factor: 0.18 }
    ];

    function formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function formatAmount(value) {
      return Number(value).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatInteger(value) {
      return String(Math.max(0, Math.round(value))).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function scaleValue(value, factor) {
      if (!isNumberLike(value) || value.includes("%")) return value;
      const numeric = Number(value.replace(/,/g, ""));
      if (!Number.isFinite(numeric)) return value;
      return value.includes(".") ? formatAmount(numeric * factor) : formatInteger(numeric * factor);
    }

    function createChannelRow(source, channel, date, index) {
      const row = [...source];
      row[0] = String(index + 1);
      row[1] = date;
      row[2] = channel.id;
      row[3] = channel.name;
      row.splice(21, 0, formatAmount(Number(row[20].replace(/,/g, "")) * 38.6));
      if (channel.id !== "ALL") {
        for (let column = 4; column < row.length; column += 1) {
          row[column] = scaleValue(row[column], channel.factor);
        }
      }
      return row;
    }

    function buildThirtyDayRows(seedRows) {
      const builtRows = [];
      for (let index = 0; index < 30; index += 1) {
        const source = seedRows[index % seedRows.length];
        const date = formatDate(addDays(baseDate, -index));
        channelOptions.forEach((channel) => {
          builtRows.push(createChannelRow(source, channel, date, index));
        });
      }
      return builtRows;
    }

    const allRows = buildThirtyDayRows(rows);

    function isNumberLike(value) {
      return /[%\d]$/.test(value) && !/^\d{4}-/.test(value) && value !== "ALL";
    }

    function getRangeConfig(range) {
      if (range === "today") {
        return { start: formatDate(baseDate), end: formatDate(baseDate), label: "今日" };
      }
      if (range === "yesterday") {
        const yesterday = formatDate(addDays(baseDate, -1));
        return { start: yesterday, end: yesterday, label: "昨日" };
      }
      if (range === "7") {
        return { start: formatDate(addDays(baseDate, -6)), end: formatDate(baseDate), label: "近7日" };
      }
      if (range === "custom") {
        const start = customStart.value || "2026-06-18";
        const end = customEnd.value || "2026-06-21";
        return start <= end
          ? { start, end, label: "自定义" }
          : { start: end, end: start, label: "自定义" };
      }
      return { start: formatDate(addDays(baseDate, -29)), end: formatDate(baseDate), label: "近30日" };
    }

    function getFilteredRows() {
      const { start, end } = getRangeConfig(currentRange);
      const channel = channelSelect.value;
      return allRows.filter((row) => row[1] >= start && row[1] <= end && row[2] === channel);
    }

    function updateDateRangeText() {
      const { start, end } = getRangeConfig(currentRange);
      dateRangeText.innerHTML = `${start} <span class="arrow">→</span> ${end}`;
      dateFilter.classList.toggle("custom", currentRange === "custom");
    }

    function renderMetrics() {
      document.getElementById("metrics").innerHTML = metrics.map(([title, value, change, sub]) => `
        <article class="metric">
          <span class="help">?</span>
          <div class="metric-title">${title}</div>
          <div class="metric-row">
            <div class="metric-value">${value}</div>
            <div class="metric-change">${change}</div>
          </div>
          <div class="metric-sub">${sub}</div>
        </article>
      `).join("");
    }

    function renderTable() {
      const visibleFields = fields.filter((field) => field[1]);
      const indexes = fields.map((field, index) => field[1] ? index : -1).filter((index) => index !== -1);
      const header = visibleFields.map(([name]) => `<th>${name} <span class="help">?</span></th>`).join("");
      const activeRows = getFilteredRows();
      const body = activeRows.map((row, rowIndex) => {
        const displayRow = [...row];
        displayRow[0] = String(rowIndex + 1);
        return `
        <tr>
          ${indexes.map((index) => {
            const value = displayRow[index];
            const cls = [isNumberLike(value) ? "num" : "", value && value.startsWith("-") ? "negative" : ""].join(" ").trim();
            return `<td class="${cls}">${value}</td>`;
          }).join("")}
        </tr>
      `;
      }).join("");
      table.innerHTML = `<thead><tr>${header}</tr></thead><tbody>${body}</tbody>`;
      document.getElementById("fieldCount").textContent = `当前展示 ${visibleFields.length} 个字段，字段总数 ${fields.length} 个`;
      document.getElementById("rowCount").textContent = `共 ${activeRows.length} 条，每页 10 条`;
      updateDateRangeText();
    }

    function renderFields() {
      fieldList.innerHTML = fields.map(([name, checked, pinned], index) => `
        <div class="field-row">
          <span class="check ${checked ? "on" : ""}" data-index="${index}"></span>
          <span class="drag"></span>
          <span>${name}</span>
          <span class="pin ${pinned ? "blue" : "muted"}"></span>
          <span class="pin"></span>
        </div>
      `).join("");
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function openDrawer() {
      renderFields();
      drawer.classList.add("open");
      mask.classList.add("open");
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      mask.classList.remove("open");
    }

    document.querySelectorAll(".quick-tabs button").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".quick-tabs button").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        currentRange = button.dataset.range;
        renderTable();
        dailyDetail.scrollIntoView({ behavior: "smooth", block: "start" });
        showToast(`已切换到${button.textContent}数据`);
      });
    });

    [customStart, customEnd].forEach((input) => {
      input.addEventListener("change", () => {
        currentRange = "custom";
        document.querySelectorAll(".quick-tabs button").forEach((item) => {
          item.classList.toggle("active", item.dataset.range === "custom");
        });
        renderTable();
        showToast("已按自定义日期筛选");
      });
    });

    channelSelect.addEventListener("change", () => {
      renderTable();
      showToast(`已切换到${channelSelect.options[channelSelect.selectedIndex].text}`);
    });

    fieldList.addEventListener("click", (event) => {
      const check = event.target.closest(".check");
      if (!check) return;
      const index = Number(check.dataset.index);
      fields[index][1] = !fields[index][1];
      renderFields();
      renderTable();
    });

    document.getElementById("fieldBtn").addEventListener("click", openDrawer);
    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
    document.getElementById("cancelDrawer").addEventListener("click", closeDrawer);
    document.getElementById("confirmDrawer").addEventListener("click", () => { closeDrawer(); showToast("字段配置已保存"); });
    document.getElementById("restoreBtn").addEventListener("click", () => {
      fields.forEach((field) => field[1] = true);
      renderFields();
      renderTable();
      showToast("已恢复全部字段");
    });
    mask.addEventListener("click", closeDrawer);
    document.getElementById("searchBtn").addEventListener("click", () => {
      renderTable();
      dailyDetail.scrollIntoView({ behavior: "smooth", block: "start" });
      showToast("已按当前筛选条件查询");
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      currentRange = "30";
      channelSelect.value = "ALL";
      customStart.value = "2026-06-18";
      customEnd.value = "2026-06-21";
      document.querySelectorAll(".quick-tabs button").forEach((item) => {
        item.classList.toggle("active", item.dataset.range === "30");
      });
      renderTable();
      showToast("筛选条件已重置");
    });
    document.getElementById("refreshBtn").addEventListener("click", () => showToast("已刷新日报详细数据"));
    document.getElementById("exportBtn").addEventListener("click", () => showToast("已生成导出任务"));

    renderMetrics();
    renderTable();
  </script>
</body>
</html>
